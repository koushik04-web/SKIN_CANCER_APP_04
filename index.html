<!DOCTYPE html>
<html>
<head>
    <title>Skin Cancer Detection</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: url("/static/bgf.jpg") no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            padding: 0;
        }
        .tagline {
            margin-top: 40px;
            font-size: 28px;
            font-weight: bold;
            color: #1565C0;
            letter-spacing: 1px;
            text-shadow: 1px 1px 3px rgba(255,255,255,0.8);
            font-family: Georgia, serif;
        }
        .container {
            margin-top: 30px;
            background: white;
            padding: 40px 60px;
            border-radius: 15px;
            width: 500px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }
        button {
            padding: 10px 30px;
            margin-top: 10px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
        img {
            margin-top: 10px;
            width: 300px;
            border-radius: 10px;
        }
        h2 {
            color: #333;
            font-size: 26px;
        }
        h3 {
            color: #444;
        }
    </style>
</head>
<body>

<div class="tagline">Early Detection Saves Lives</div>

<div class="container">
    <h2>Skin Cancer Detection</h2>
    <input type="file" id="imageInput" accept=".jpg,.jpeg,.png">
    <br>
    <img id="preview" src="">
    <br>
    <button onclick="uploadImage()">Predict</button>
    <h3 id="result"></h3>
</div>

<script>
function uploadImage() {
    let fileInput = document.getElementById("imageInput");
    let file = fileInput.files[0];
    if (!file) {
        document.getElementById("result").innerText = "Please select an image!";
        return;
    }
    document.getElementById("result").innerText = "Predicting...";
    let formData = new FormData();
    formData.append("file", file);
    fetch("/predict", {
        method: "POST",
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById("result").innerText =
            "Result: " + data.prediction +
            " (Confidence: " + (data.confidence * 100).toFixed(1) + "%)";
    })
    .catch(err => {
        document.getElementById("result").innerText = "Error: " + err;
    });
}
document.getElementById("imageInput").onchange = function(evt) {
    let [file] = this.files;
    if (file) {
        document.getElementById("preview").src = URL.createObjectURL(file);
    }
};
</script>

</body>
</html>
